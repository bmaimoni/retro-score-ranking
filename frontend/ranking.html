<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Score — Ranking ao Vivo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600;700&family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap">
  <style>
    /* ── Layout da página de ranking ── */
    .ranking-page {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      max-width: var(--max-width-ranking);
      margin: 0 auto;
      padding: var(--space-lg) var(--space-xl);
    }

    /* ── Header ── */
    .ranking-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding-bottom: var(--space-lg);
      border-bottom: var(--border-width) solid var(--color-border);
      margin-bottom: var(--space-lg);
      gap: var(--space-md);
    }

    .ranking-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--color-primary);
      line-height: 1.3;
      text-align: center;
      grid-column: 2;
    }

    .ranking-meta {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .ranking-meta-right {
      align-items: flex-end;
    }

    .meta-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .meta-value {
      font-family: var(--font-mono);
      font-size: var(--text-md);
      color: var(--color-text);
      font-weight: var(--weight-bold);
    }

    /* ── Seletor de jogo ── */
    .game-tabs {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-lg);
    }

    .game-tab {
      padding: var(--space-sm) var(--space-md);
      background: var(--color-bg-surface);
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-full);
      color: var(--color-text-muted);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
    }
    .game-tab:hover {
      border-color: var(--color-border-hover);
      color: var(--color-text);
    }
    .game-tab.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
      box-shadow: 0 0 16px calc(var(--glow-intensity) * 1px) var(--color-primary-glow);
    }

    /* ── Status de conexão SSE ── */
    .connection-status {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Grid do ranking ── */
    .ranking-grid {
      display: flex;
      flex-direction: column;
      gap: var(--card-gap);
    }

    /* ── Card de jogador ── */
    .player-card {
      display: grid;
      grid-template-columns: 56px 72px 1fr auto;
      align-items: center;
      gap: var(--space-md);
      height: var(--card-height-tv);
      background: var(--color-bg-surface);
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      animation: slideUp var(--anim-slow) ease both;
      transition: border-color var(--anim-normal) ease;
    }
    .player-card:hover { border-color: var(--color-border-hover); }

    /* Destaque para novas entradas */
    .player-card.new-entry {
      animation: newEntry 1.5s ease both;
      border-color: var(--color-secondary);
    }

    /* Pódio */
    .player-card.pos-1 {
      border-color: var(--color-gold);
      background: linear-gradient(135deg, rgba(255,215,0,0.06) 0%, var(--color-bg-surface) 100%);
    }
    .player-card.pos-2 {
      border-color: var(--color-silver);
      background: linear-gradient(135deg, rgba(192,192,192,0.04) 0%, var(--color-bg-surface) 100%);
    }
    .player-card.pos-3 {
      border-color: var(--color-bronze);
      background: linear-gradient(135deg, rgba(205,127,50,0.04) 0%, var(--color-bg-surface) 100%);
    }

    /* ── Posição ── */
    .player-pos {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      border-radius: var(--radius-sm);
      font-family: var(--font-display);
      font-size: var(--text-sm);
      flex-shrink: 0;
      background: var(--color-bg-surface2);
      color: var(--color-text-muted);
    }
    .player-pos.pos-1 { background: rgba(255,215,0,0.15);   color: var(--color-gold);   font-size: var(--text-lg); }
    .player-pos.pos-2 { background: rgba(192,192,192,0.12); color: var(--color-silver); font-size: var(--text-lg); }
    .player-pos.pos-3 { background: rgba(205,127,50,0.12);  color: var(--color-bronze); font-size: var(--text-lg); }

    /* ── Foto ── */
    .player-photo {
      width: var(--photo-size-tv);
      height: var(--photo-size-tv);
      border-radius: var(--radius-sm);
      object-fit: cover;
      border: var(--border-width) solid var(--color-border);
      flex-shrink: 0;
    }

    .player-photo-placeholder {
      width: var(--photo-size-tv);
      height: var(--photo-size-tv);
      border-radius: var(--radius-sm);
      background: var(--color-bg-surface2);
      border: var(--border-width) solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      flex-shrink: 0;
    }

    /* ── Info do jogador ── */
    .player-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-nick {
      font-family: var(--font-body);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.04em;
    }

    .player-time {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
    }

    /* ── Pontuação ── */
    .player-score {
      text-align: right;
      flex-shrink: 0;
    }

    .player-score-value {
      font-family: var(--font-mono);
      font-size: var(--score-size-tv);
      font-weight: var(--weight-bold);
      color: var(--color-accent);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .pos-1 .player-score-value { color: var(--color-gold); }
    .pos-2 .player-score-value { color: var(--color-silver); }
    .pos-3 .player-score-value { color: var(--color-bronze); }

    .player-score-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: right;
      margin-top: 2px;
    }

    /* ── Estado vazio ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      min-height: 300px;
      color: var(--color-text-muted);
      text-align: center;
      animation: fadeIn var(--anim-slow) ease both;
    }

    .empty-icon {
      font-size: 64px;
      line-height: 1;
      animation: pulse 3s ease-in-out infinite;
    }

    .empty-title {
      font-family: var(--font-display);
      font-size: var(--text-md);
      color: var(--color-text-dim);
      line-height: 1.5;
    }

    /* ── Barra inferior: QR + total ── */
    .ranking-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--space-lg);
      padding-top: var(--space-md);
      border-top: var(--border-width) solid var(--color-border);
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .footer-qr-hint {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .footer-url {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-secondary);
      letter-spacing: 0.04em;
    }

    .footer-hint {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .footer-count {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
    }

    /* ── Responsividade para telas menores ── */
    @media (max-width: 768px) {
      .ranking-page { padding: var(--space-md); }
      .ranking-header { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
      .ranking-title { grid-column: 1; font-size: var(--text-md); }
      .ranking-meta-right { align-items: flex-start; }
      .player-card { grid-template-columns: 40px 56px 1fr auto; height: auto; padding: var(--space-sm); }
      .player-nick { font-size: var(--text-md); }
      --score-size-tv: var(--text-lg);
    }
  </style>
</head>
<body>

<div class="ranking-page">

  <!-- Header -->
  <header>
    <div class="ranking-header">
      <div class="ranking-meta">
        <span class="meta-label">Jogo atual</span>
        <span class="meta-value" id="jogo-nome">—</span>
      </div>

      <h1 class="ranking-title">HIGH<br>SCORES</h1>

      <div class="ranking-meta ranking-meta-right">
        <div class="connection-status">
          <div class="connection-dot" id="conn-dot"></div>
          <span id="conn-label">AO VIVO</span>
        </div>
      </div>
    </div>

    <!-- Tabs de jogos -->
    <div class="game-tabs" id="game-tabs" role="tablist">
      <span class="meta-label" style="align-self:center">Carregando...</span>
    </div>
  </header>

  <!-- Lista do ranking -->
  <main>
    <div class="ranking-grid" id="ranking-grid" role="list">
      <!-- Preenchido via JS -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="ranking-footer">
    <div class="footer-qr-hint">
      <div>
        <p class="footer-hint">Participe pelo celular</p>
        <p class="footer-url" id="footer-url">—</p>
      </div>
    </div>
    <span class="footer-count" id="footer-count"></span>
  </footer>

</div>

<script type="module">
import { aplicarTema } from './temas.js';

// ── CONFIGURAÇÃO ──────────────────────────────────────────────────────────────
const API_URL      = 'https://retro-score-ranking-production.up.railway.app';
const UPLOAD_URL   = window.location.origin + '/index.html'; // URL do formulário de upload

// Delay entre animações de entrada (ms)
const STAGGER_DELAY = 60;

// ── ESTADO ────────────────────────────────────────────────────────────────────
let jogoAtual = null;   // { id, nome, slug }
let entradas  = [];     // lista atual do ranking
let sseSource = null;   // EventSource ativo

// ── INICIALIZAÇÃO ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('footer-url').textContent = UPLOAD_URL;
  await carregarJogos();
});

// ── JOGOS ─────────────────────────────────────────────────────────────────────
async function carregarJogos() {
  try {
    const resp = await fetch(`${API_URL}/api/jogos`);
    if (!resp.ok) throw new Error();
    const jogos = await resp.json();
    renderTabs(jogos);
    if (jogos.length > 0) selecionarJogo(jogos[0]);
  } catch {
    document.getElementById('game-tabs').innerHTML =
      '<span class="meta-label" style="color:var(--color-error)">Erro ao carregar jogos</span>';
  }
}

function renderTabs(jogos) {
  const container = document.getElementById('game-tabs');
  container.innerHTML = jogos.map(j => `
    <button class="game-tab" role="tab" data-slug="${j.slug}" data-id="${j.id}" data-nome="${j.nome}">
      ${j.nome}
    </button>
  `).join('');

  container.querySelectorAll('.game-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      selecionarJogo({ id: tab.dataset.id, nome: tab.dataset.nome, slug: tab.dataset.slug });
    });
  });
}

async function selecionarJogo(jogo) {
  jogoAtual = jogo;

  // Aplica tema do jogo
  aplicarTema(jogo.slug);

  // Atualiza tabs
  document.querySelectorAll('.game-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.slug === jogo.slug);
  });

  // Atualiza header
  document.getElementById('jogo-nome').textContent = jogo.nome;

  // Desconecta SSE anterior
  desconectarSSE();

  // Carrega snapshot + conecta SSE
  await carregarRanking(jogo);
  conectarSSE(jogo.slug);
}

// ── RANKING SNAPSHOT ──────────────────────────────────────────────────────────
async function carregarRanking(jogo) {
  renderLoading();
  try {
    const resp = await fetch(`${API_URL}/api/ranking/${jogo.slug}`);
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    entradas = data.entradas || [];
    renderRanking(entradas);
  } catch {
    renderErro();
  }
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function conectarSSE(slug) {
  sseSource = new EventSource(`${API_URL}/api/events/ranking/${slug}`);

  sseSource.addEventListener('novo_registro', e => {
    const nova = JSON.parse(e.data);
    // Remove entrada anterior do mesmo nick se existir
    entradas = entradas.filter(en => en.nick.toLowerCase().trim() !== nova.nick.toLowerCase().trim());
    entradas.push(nova);
    entradas.sort((a, b) => b.pontuacao - a.pontuacao);
    renderRanking(entradas, nova.id);
  });

  sseSource.addEventListener('ocultar', e => {
    const { id } = JSON.parse(e.data);
    entradas = entradas.filter(en => en.id !== id);
    renderRanking(entradas);
  });

  sseSource.addEventListener('reativar', e => {
    const { entrada } = JSON.parse(e.data);
    entradas = entradas.filter(en => en.id !== entrada.id);
    entradas.push(entrada);
    entradas.sort((a, b) => b.pontuacao - a.pontuacao);
    renderRanking(entradas, entrada.id);
  });

  sseSource.onopen = () => setConexao(true);
  sseSource.onerror = () => {
    setConexao(false);
    // Tenta reconectar a cada 5s
    setTimeout(() => {
      if (jogoAtual) conectarSSE(jogoAtual.slug);
    }, 5000);
  };
}

function desconectarSSE() {
  if (sseSource) {
    sseSource.close();
    sseSource = null;
  }
  setConexao(false);
}

function setConexao(online) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.classList.toggle('disconnected', !online);
  label.textContent = online ? 'AO VIVO' : 'RECONECTANDO...';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderRanking(lista, novaEntradaId = null) {
  const grid = document.getElementById('ranking-grid');
  const count = document.getElementById('footer-count');

  if (lista.length === 0) {
    renderVazio();
    count.textContent = '';
    return;
  }

  count.textContent = `${lista.length} participante${lista.length !== 1 ? 's' : ''}`;

  grid.innerHTML = lista.map((entry, i) => {
    const pos     = i + 1;
    const posClass = pos <= 3 ? `pos-${pos}` : '';
    const posLabel = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;
    const isNew    = entry.id === novaEntradaId;
    const delay    = isNew ? 0 : i * STAGGER_DELAY;
    const foto     = entry.foto_url
      ? `<img class="player-photo" src="${entry.foto_url}" alt="Foto de ${entry.nick}" loading="lazy">`
      : `<div class="player-photo-placeholder">${entry.nick.charAt(0).toUpperCase()}</div>`;

    return `
      <div class="player-card ${posClass} ${isNew ? 'new-entry' : ''}"
           role="listitem"
           style="animation-delay: ${delay}ms">
        <div class="player-pos ${posClass}">${posLabel}</div>
        ${foto}
        <div class="player-info">
          <span class="player-nick">${escapar(entry.nick)}</span>
          <span class="player-time">${tempoRelativo(entry.criado_em)}</span>
        </div>
        <div class="player-score">
          <div class="player-score-value">${entry.pontuacao.toLocaleString('pt-BR')}</div>
          <div class="player-score-label">pts</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderLoading() {
  document.getElementById('ranking-grid').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon" style="animation:blink 1s step-end infinite">▋</div>
      <p class="empty-title">CARREGANDO...</p>
    </div>
  `;
}

function renderVazio() {
  document.getElementById('ranking-grid').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">👾</div>
      <p class="empty-title">NENHUM SCORE<br>AINDA</p>
      <p class="meta-label">Seja o primeiro a jogar!</p>
    </div>
  `;
}

function renderErro() {
  document.getElementById('ranking-grid').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <p class="empty-title" style="color:var(--color-error)">ERRO DE CONEXÃO</p>
      <p class="meta-label">Verifique a conexão com o servidor</p>
    </div>
  `;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function tempoRelativo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000)  return 'agora mesmo';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}min atrás`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h atrás`;
  return `${Math.floor(diff / 86400000)}d atrás`;
}

function escapar(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
</script>
</body>
</html>
