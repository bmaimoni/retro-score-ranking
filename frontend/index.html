<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Retro Score — Envie sua pontuação</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Layout da página de upload ── */
    .upload-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-xl) var(--space-md) var(--space-2xl);
    }

    .upload-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .upload-header h1 {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      color: var(--color-primary);
      line-height: 1.4;
      margin-bottom: var(--space-sm);
    }

    .upload-header p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    /* ── Formulário ── */
    .upload-form {
      width: 100%;
      max-width: var(--max-width-upload);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Zona de foto ── */
    .photo-zone {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--color-bg-surface);
      border: var(--border-width) dashed var(--color-border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      cursor: pointer;
      overflow: hidden;
      transition: border-color var(--transition);
      margin-bottom: var(--space-md);
    }
    .photo-zone:hover { border-color: var(--color-border-hover); }
    .photo-zone.has-photo { border-style: solid; border-color: var(--color-secondary); }
    .photo-zone.drag-over { border-color: var(--color-primary); background: rgba(252,63,110,0.05); }

    .photo-zone-icon {
      font-size: 40px;
      line-height: 1;
    }

    .photo-zone-text {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-align: center;
      padding: 0 var(--space-lg);
      line-height: 1.5;
    }

    .photo-zone-badge {
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-secondary);
      border: 1px solid var(--color-secondary);
      border-radius: var(--radius-full);
      padding: 4px 12px;
    }

    .photo-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: var(--color-bg-overlay);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .photo-zone.has-photo:hover .photo-overlay { opacity: 1; }
    .photo-overlay span {
      font-size: var(--text-sm);
      color: var(--color-text);
      font-weight: var(--weight-bold);
    }

    #file-input { display: none; }

    /* ── Linha de pontuação ── */
    .score-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }

    /* ── Consentimento LGPD ── */
    .consent-area {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      padding: var(--space-md);
      background: var(--color-bg-surface);
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius-sm);
    }
    .consent-checkbox {
      flex-shrink: 0;
      width: 20px; height: 20px;
      margin-top: 2px;
      accent-color: var(--color-primary);
      cursor: pointer;
    }
    .consent-text {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    /* ── Estado de sucesso ── */
    .success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: var(--space-md);
      padding: var(--space-xl) 0;
      animation: fadeIn var(--anim-slow) ease both;
    }
    .success-state.visible { display: flex; }

    .success-icon {
      font-size: 64px;
      line-height: 1;
    }

    .success-title {
      font-family: var(--font-display);
      font-size: var(--text-md);
      color: var(--color-secondary);
      line-height: 1.5;
    }

    .success-score {
      font-family: var(--font-mono);
      font-size: var(--text-3xl);
      color: var(--color-accent);
      letter-spacing: 0.05em;
    }

    .success-message {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      max-width: 320px;
    }

    /* ── Progress bar de upload ── */
    .upload-progress {
      display: none;
      flex-direction: column;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    .upload-progress.visible { display: flex; }

    .progress-bar-track {
      width: 100%;
      height: 4px;
      background: var(--color-bg-surface2);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-full);
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Link para o ranking ── */
    .ranking-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      margin-top: var(--space-xl);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      text-decoration: none;
      transition: color var(--transition);
    }
    .ranking-link:hover { color: var(--color-secondary); }
  </style>
</head>
<body>

<div class="upload-page">

  <!-- Cabeçalho -->
  <header class="upload-header animate-slide-up">
    <h1>INSERT COIN</h1>
    <p>Fotografe seu placar e entre no ranking</p>
  </header>

  <!-- Formulário de upload -->
  <form class="upload-form animate-fade-in" id="upload-form" novalidate>

    <!-- Zona de foto -->
    <div class="photo-zone" id="photo-zone" role="button" tabindex="0"
         aria-label="Toque para selecionar a foto do seu placar">
      <div class="photo-zone-icon">📷</div>
      <p class="photo-zone-text">Toque para tirar uma foto<br>ou selecionar da galeria</p>
      <span class="photo-zone-badge">JPEG ou PNG · máx 5MB</span>
      <div class="photo-overlay"><span>✦ Trocar foto</span></div>
    </div>
    <input type="file" id="file-input" accept="image/jpeg,image/png" capture="environment">

    <!-- Jogo -->
    <div class="field">
      <label class="field-label" for="jogo-select">Jogo</label>
      <select class="field-input" id="jogo-select" required>
        <option value="">Carregando jogos...</option>
      </select>
    </div>

    <!-- Nick -->
    <div class="field">
      <label class="field-label" for="nick-input">Seu nickname</label>
      <input class="field-input" type="text" id="nick-input"
             placeholder="Ex: PLAYER1" maxlength="50" required
             autocomplete="off" autocapitalize="characters" spellcheck="false">
    </div>

    <!-- Pontuação -->
    <div class="field">
      <label class="field-label" for="score-input">Pontuação</label>
      <input class="field-input font-mono" type="number" id="score-input"
             placeholder="000000" min="1" required
             inputmode="numeric">
    </div>

    <!-- Consentimento LGPD -->
    <div class="consent-area">
      <input type="checkbox" class="consent-checkbox" id="consent-check">
      <label class="consent-text" for="consent-check">
        Concordo que minha foto e nome sejam exibidos no ranking público do evento.
        Os dados serão removidos após o encerramento do evento.
      </label>
    </div>

    <!-- Progress bar (oculta até o envio) -->
    <div class="upload-progress" id="upload-progress">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <p class="progress-label" id="progress-label">Enviando...</p>
    </div>

    <!-- Botão de envio -->
    <button type="submit" class="btn-primary" id="submit-btn">
      ▶ ENVIAR PONTUAÇÃO
    </button>

  </form>

  <!-- Estado de sucesso (oculto até o envio) -->
  <div class="success-state" id="success-state">
    <div class="success-icon">🏆</div>
    <h2 class="success-title">PONTUAÇÃO<br>REGISTRADA!</h2>
    <div class="success-score" id="success-score">000000</div>
    <p class="success-message" id="success-message">
      Você está no ranking! Acompanhe sua posição no telão.
    </p>
    <button class="btn-ghost" id="play-again-btn" style="max-width:320px">
      ↺ JOGAR NOVAMENTE
    </button>
  </div>

  <!-- Link para o ranking -->
  <a href="ranking.html" class="ranking-link">
    Ver ranking geral →
  </a>

</div>

<!-- Toast de feedback -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIGURAÇÃO ──────────────────────────────────────────────────────────────
// Troque a URL da API quando fizer deploy
const API_URL = 'https://retro-score-ranking-production.up.railway.app';

// ── ESTADO ────────────────────────────────────────────────────────────────────
let fotoFile = null;
let jogos    = [];

// ── INICIALIZAÇÃO ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  carregarJogos();
  configurarFotoZone();
  configurarForm();
  configurarPlayAgain();
});

// ── JOGOS ─────────────────────────────────────────────────────────────────────
async function carregarJogos() {
  const select = document.getElementById('jogo-select');
  try {
    const resp = await fetch(`${API_URL}/api/jogos`);
    if (!resp.ok) throw new Error('Falha ao carregar jogos');
    jogos = await resp.json();
    select.innerHTML = '<option value="">Selecione o jogo...</option>' +
      jogos.map(j => `<option value="${j.id}">${j.nome}</option>`).join('');
  } catch (e) {
    select.innerHTML = '<option value="">Erro ao carregar jogos</option>';
    showToast('Erro ao conectar com o servidor', 'error');
  }
}

// ── FOTO ──────────────────────────────────────────────────────────────────────
function configurarFotoZone() {
  const zone  = document.getElementById('photo-zone');
  const input = document.getElementById('file-input');

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') input.click(); });

  // Drag and drop (desktop)
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processarFoto(file);
  });

  input.addEventListener('change', e => {
    if (e.target.files[0]) processarFoto(e.target.files[0]);
  });
}

function processarFoto(file) {
  // Validação de tamanho (5MB)
  if (file.size > 5 * 1024 * 1024) {
    showToast('Foto muito grande. Máximo: 5MB', 'error');
    return;
  }
  // Validação de tipo
  if (!['image/jpeg', 'image/png'].includes(file.type)) {
    showToast('Apenas JPEG e PNG são aceitos', 'error');
    return;
  }

  fotoFile = file;
  const zone = document.getElementById('photo-zone');
  const reader = new FileReader();

  reader.onload = e => {
    // Remove conteúdo anterior e adiciona preview
    zone.innerHTML = `
      <img class="photo-preview" src="${e.target.result}" alt="Preview da foto">
      <div class="photo-overlay"><span>✦ Trocar foto</span></div>
    `;
    zone.classList.add('has-photo');
    zone.style.cursor = 'pointer';
    // Reatribui o click para a zona continuar funcional
    zone.onclick = () => document.getElementById('file-input').click();
  };
  reader.readAsDataURL(file);
}

// ── FORMULÁRIO ────────────────────────────────────────────────────────────────
function configurarForm() {
  document.getElementById('upload-form').addEventListener('submit', async e => {
    e.preventDefault();
    await enviarPontuacao();
  });
}

async function enviarPontuacao() {
  // Validações
  if (!fotoFile) {
    showToast('Adicione uma foto do placar', 'error');
    return;
  }
  const jogoId = document.getElementById('jogo-select').value;
  if (!jogoId) {
    showToast('Selecione o jogo', 'error');
    return;
  }
  const nick = document.getElementById('nick-input').value.trim();
  if (!nick) {
    showToast('Digite seu nickname', 'error');
    return;
  }
  const pontuacao = parseInt(document.getElementById('score-input').value);
  if (!pontuacao || pontuacao <= 0) {
    showToast('Digite uma pontuação válida', 'error');
    return;
  }
  if (!document.getElementById('consent-check').checked) {
    showToast('Confirme o consentimento para participar', 'error');
    return;
  }

  // UI: modo de envio
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '⏳ ENVIANDO...';
  mostrarProgress(true, 30, 'Preparando envio...');

  try {
    const formData = new FormData();
    formData.append('foto', fotoFile);
    formData.append('nick', nick);
    formData.append('pontuacao', pontuacao);
    formData.append('jogo_id', jogoId);

    mostrarProgress(true, 60, 'Enviando foto...');

    const resp = await fetch(`${API_URL}/api/upload`, {
      method: 'POST',
      body: formData,
    });

    mostrarProgress(true, 90, 'Registrando...');
    const data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.detail || 'Erro ao enviar');
    }

    mostrarProgress(true, 100, 'Concluído!');
    await delay(400);

    // Exibe estado de sucesso
    mostrarSucesso(nick, pontuacao, data.pendente);

  } catch (err) {
    mostrarProgress(false);
    btn.disabled = false;
    btn.textContent = '▶ ENVIAR PONTUAÇÃO';
    showToast(err.message || 'Erro ao enviar. Tente novamente.', 'error');
  }
}

function mostrarSucesso(nick, pontuacao, pendente) {
  document.getElementById('upload-form').style.display = 'none';
  const state = document.getElementById('success-state');
  state.classList.add('visible');

  document.getElementById('success-score').textContent =
    pontuacao.toLocaleString('pt-BR');

  document.getElementById('success-message').textContent = pendente
    ? 'Sua pontuação está em análise e aparecerá em breve no ranking.'
    : `Você está no ranking, ${nick}! Acompanhe sua posição no telão.`;
}

function configurarPlayAgain() {
  document.getElementById('play-again-btn').addEventListener('click', () => {
    // Reset completo do formulário
    fotoFile = null;
    document.getElementById('upload-form').reset();
    document.getElementById('upload-form').style.display = 'flex';
    document.getElementById('success-state').classList.remove('visible');
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = '▶ ENVIAR PONTUAÇÃO';
    mostrarProgress(false);

    // Reset da foto zone
    const zone = document.getElementById('photo-zone');
    zone.classList.remove('has-photo');
    zone.innerHTML = `
      <div class="photo-zone-icon">📷</div>
      <p class="photo-zone-text">Toque para tirar uma foto<br>ou selecionar da galeria</p>
      <span class="photo-zone-badge">JPEG ou PNG · máx 5MB</span>
      <div class="photo-overlay"><span>✦ Trocar foto</span></div>
    `;
    zone.onclick = () => document.getElementById('file-input').click();
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function mostrarProgress(visivel, pct = 0, label = '') {
  const container = document.getElementById('upload-progress');
  const fill      = document.getElementById('progress-fill');
  const lbl       = document.getElementById('progress-label');
  container.classList.toggle('visible', visivel);
  fill.style.width  = `${pct}%`;
  lbl.textContent   = label;
}

function showToast(msg, tipo = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className   = `toast ${tipo} show`;
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
}

function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}
</script>
</body>
</html>
