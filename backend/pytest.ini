[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = session
testpaths = tests
pythonpath = . tests
addopts = -v --tb=short
python_files = test_*.py smoke_*.py
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning